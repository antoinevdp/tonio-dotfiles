[config]
version_check = false

[templates.hyprland]
input_path = '~/.config/matugen/templates/hyprland.lua'
output_path = '~/.cache/matugen/hyprland.lua'

[templates.hyprland_legacy]
input_path = '~/.config/matugen/templates/hyprland.conf'
output_path = '~/.cache/matugen/hyprland.conf'

[templates.waybar]
input_path = '~/.config/matugen/templates/waybar.css'
output_path = '~/.cache/matugen/waybar.css'

[templates.swaync]
input_path = '~/.config/matugen/templates/swaync.css'
output_path = '~/.cache/matugen/swaync.css'
post_hook = 'swaync-client -rs'

[templates.quickshell]
input_path = '~/.config/matugen/templates/quickshell-colors.qml'
output_path = '~/.config/quickshell/Colors.qml'

[templates.ghostty]
input_path = '~/.config/matugen/templates/ghostty.conf'
output_path = '~/.cache/matugen/ghostty.conf'

[templates.hyprlock]
input_path = '~/.config/matugen/templates/hyprlock.conf'
output_path = '~/.cache/matugen/hyprlock.conf'

[templates.vicinae]
input_path = '~/.config/matugen/templates/vicinae.toml'
output_path = '~/.local/share/vicinae/themes/matugen.toml'
post_hook = 'vicinae theme set matugen'

[templates.gtk]
input_path = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.cache/matugen/gtk-colors.css'
post_hook = 'gsettings set org.gnome.desktop.interface color-scheme prefer-{{mode}}; gsettings set org.gnome.desktop.interface gtk-theme ""; gsettings set org.gnome.desktop.interface gtk-theme adw-gtk3-{{mode}}'

[templates.vscode_package]
input_path = '~/.config/matugen/templates/vscode-package.json'
output_path = '~/.vscode/extensions/local.matugen-theme-0.0.1/package.json'

[templates.vscode_theme]
input_path = '~/.config/matugen/templates/vscode-theme.json'
output_path = '~/.vscode/extensions/local.matugen-theme-0.0.1/themes/matugen-color-theme.json'
